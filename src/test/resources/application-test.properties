spring.config.activate.on-profile=test

# Match dev role split
spring.datasource.username=nuledger_app
spring.datasource.password=nuledger_app
spring.flyway.user=nuledger_owner
spring.flyway.password=nuledger_owner

spring.docker.compose.enabled=false

# Avoid Keycloak at test startup — use TestJwtConfig instead
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://test.invalid/realms/nuledger

nuledger.security.tenant-claim=tenant_id

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.tenant_identifier_to_use_for_any_key=BOOTSTRAP

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
scalar.enabled=false
