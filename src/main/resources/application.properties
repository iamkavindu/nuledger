# Application
spring.application.name=nuledger
spring.profiles.active=dev

# Enable virtual threads
spring.threads.virtual.enabled=true

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/nuledger
spring.datasource.username=nuledger_app
spring.datasource.password=nuledger_app

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.multiTenancy=DISCRIMINATOR

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OAuth2 resource server configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/nuledger

# Actuator configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Docker configuration
spring.docker.compose.enabled=false

# Tenant bootstrap
spring.jpa.properties.hibernate.tenant_identifier_to_use_for_any_key=BOOTSTRAP

# JWT helper
nuledger.security.tenant-claim=tenant_id

# observability
# Kubernetes probe endpoints: /actuator/health/liveness, /actuator/health/readiness
management.endpoint.health.probes.enabled=true

# Liveness = process up; do not tie restarts to DB outages
management.endpoint.health.group.liveness.include=livenessState

# Readiness = can serve traffic; must include DB
management.endpoint.health.group.readiness.include=readinessState,db

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.enabled=true
scalar.enabled=true
scalar.path=/scalar

# Only document the public ledger API package
springdoc.packages-to-scan=dev.iamkavindu.nuledger.ledger.api
