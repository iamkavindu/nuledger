spring.application.name=nuledger
spring.profiles.active=dev
# enable virtual threads
spring.threads.virtual.enabled=true
# database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/nuledger
spring.datasource.username=nuledger_app
spring.datasource.password=nuledger_app
# jpa configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.multiTenancy=DISCRIMINATOR
# flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# OAuth2 resource server configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/nuledger
# actuator configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# docker configuration
spring.docker.compose.enabled=false
# tenant bootstrap
spring.jpa.properties.hibernate.tenant_identifier_to_use_for_any_key=BOOTSTRAP
# JWT helper
nuledger.security.tenant-claim=tenant_id
# API versioning
spring.mvc.apiversion.use.path-segment=1
spring.mvc.apiversion.default=1.0
