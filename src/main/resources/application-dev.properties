spring.config.activate.on-profile=dev

# Runtime app user (RLS enforced)
spring.datasource.url=jdbc:postgresql://localhost:5432/nuledger
spring.datasource.username=nuledger_app
spring.datasource.password=nuledger_app

# Flyway runs migrations as owner
spring.flyway.user=nuledger_owner
spring.flyway.password=nuledger_owner

spring.docker.compose.enabled=false
